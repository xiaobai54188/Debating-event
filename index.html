<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Photo</title>
    <style>
        /* 重置默认样式，消除边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 让body占满整个视口 */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 禁止滚动条 */
            background-color: #000; /* 背景设为纯黑，突出照片 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 图片容器样式 */
        .photo-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 图片样式 */
        #photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 保持图片比例，完整显示 */
            display: block;
            /* 加入淡入动画，增加仪式感 */
            animation: fadeIn 1.2s ease-in-out;
        }

        /* 淡入动画定义 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="photo-container">
        <img id="photo" src="picture.jpg" alt="Fullscreen Photo">
    </div>

    <script>
        // 可选：使用JavaScript动态加载图片，或添加交互逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const img = document.getElementById('photo');
            // 错误处理：如果图片加载失败，显示提示文字
            img.onerror = function() {
                this.style.display = 'none';
                const container = document.querySelector('.photo-container');
                container.innerHTML = '<div style="color: #fff; font-size: 24px;">图片加载失败</div>';
            };
        });
    </script>
</body>
</html>
