<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Fullscreen Photos</title>
    <style>
        /* 极简重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 主体占满全屏 */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000; /* 纯黑背景，强化对比 */
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 网格布局 - 2x2 加一张大图的经典结构 */
        .gallery {
            width: 100%;
            height: 100%;
            display: grid;
            /* 1fr 1fr 代表两列等宽，gap 为间距 */
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2px; /* 极小的缝隙，强化切割感 */
        }

        /* 第五张图片占据右下角大位置 */
        .item5 {
            grid-column: span 2; /* 跨两列 */
            grid-row: span 1;
        }

        /* 统一图片样式 */
        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保持比例并填满容器，无拉伸 */
            display: block;
            filter: contrast(1.2); /* 增强高对比度，模拟油墨剪影效果 */
            transition: filter 0.3s ease;
        }
        
        /* 悬浮时略微强化锐度 */
        .photo:hover {
            filter: contrast(1.5);
        }
        
        /* 简易指示文字 */
        .tips {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="item1"><img src="photo1.jpg" alt="Photo 1" class="photo"></div>
        <div class="item2"><img src="photo2.jpg" alt="Photo 2" class="photo"></div>
        <div class="item3"><img src="photo3.jpg" alt="Photo 3" class="photo"></div>
        <div class="item4"><img src="photo4.jpg" alt="Photo 4" class="photo"></div>
        <div class="item5"><img src="photo5.jpg" alt="Photo 5" class="photo"></div>
    </div>
    <div class="tips">高对比度极简展示 | 点击图片查看</div>

    <script>
        // 简单的点击查看逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('.photo');
            images.forEach(img => {
                img.style.cursor = 'zoom-in';
                img.onclick = function() {
                    if(this.requestFullscreen) {
                        this.requestFullscreen();
                    } else if(this.webkitRequestFullscreen) {
                        this.webkitRequestFullscreen();
                    }
                }
            });
        });
    </script>
</body>
</html>
