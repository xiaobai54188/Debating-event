<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>“青木杯”辩论赛计时器🤓👆</title>
    <style>
        :root {
            --aff-color: #3498db;
            --neg-color: #e74c3c;
            --bg: #0a0a0a;
            --panel-bg: rgba(0, 20, 50, 0.7);
            --active-gold: #f1c40f;
            --title-red: #c0392b;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'STKaiti', '楷体', 'PingFang SC', serif;
            /* 关键修改：左红右蓝渐变，并允许内容撑开高度 */
            background: linear-gradient(to right, #870000 0%, #190a05 40%, #001a35 60%, #003366 100%) fixed;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* 允许垂直滚动 */
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* 顶部大标题 */
        .school-main-title {
            text-align: center;
            font-size: 5.5rem;
            font-weight: 900;
            margin: 0;
            padding: 15px 0;
            letter-spacing: 12px;
            color: var(--title-red);
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0 0 20px rgba(241, 196, 15, 0.6);
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
            border-bottom: 2px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .header { text-align: center; padding: 5px; background: rgba(0,0,0,0.5); }
        #stage-title { color: var(--active-gold); font-weight: bold; font-size: 1.4rem; letter-spacing: 3px; }

        .rule-notice-bar { min-height: 50px; background: rgba(241, 196, 15, 0.05); display: flex; align-items: center; justify-content: center; padding: 5px; text-align: center; }
        #rule-text { font-size: 1.2rem; color: var(--active-gold); font-weight: bold; }

        /* 计时区：设定基础最小高度，防止缩得太小 */
        .timer-container { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            min-height: 400px; 
            padding: 20px 0;
        }
        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .side.active { background: rgba(255, 255, 255, 0.08); box-shadow: inset 0 0 40px rgba(255,255,255,0.05); }
        
        .time-display { 
            font-size: 18vh; /* 动态单位，随屏幕高度变化 */
            line-height: 1; 
            font-family: 'Courier New', monospace; 
            font-weight: bold; 
            margin: 10px 0; 
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .team-label { font-size: 2.2rem; font-weight: bold; margin-bottom: 10px; }
        .side-aff .team-label { color: var(--aff-color); }
        .side-neg .team-label { color: var(--neg-color); }

        .btn-group button { padding: 10px 24px; margin: 5px; font-size: 1.1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: #27ae60; color: white; }
        .btn-pause { background: #f39c12; color: white; }

        /* 底部操作面板：粘性布局，确保一直在屏幕底端 */
        .footer-panel { 
            background: var(--panel-bg); 
            padding: 15px 10px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            position: sticky;
            bottom: 0;
            z-index: 100;
            backdrop-filter: blur(10px); /* 毛玻璃效果增加高级感 */
        }
        .process-grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .mode-btn { 
            padding: 12px 10px; 
            background: rgba(0, 30, 80, 0.8);
            color: #ddd; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 1rem; 
            flex: 1; 
            min-width: 110px; 
            transition: 0.2s;
        }
        .mode-btn.active { background: var(--active-gold); color: black; font-weight: bold; border-color: var(--active-gold); }
        .mode-btn.reset-btn { background: #c0392b; color: white; border: none; }

        .credits { text-align: center; margin-top: 10px; font-size: 0.7rem; color: rgba(255,255,255,0.3); }

        /* 移动端/低分辨率适配 */
        @media (max-height: 700px) {
            .school-main-title { font-size: 2.2rem; padding: 10px 0; }
            .time-display { font-size: 25vh; }
            .team-label { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<h1 class="school-main-title">陇西县2026年“青木杯”青少年辩论赛</h1>

<div class="header">
    <span id="stage-title">准备就绪</span>
</div>

<div class="rule-notice-bar">
    <div id="rule-text">请选择环节开始比赛</div>
</div>

<div class="timer-container">
    <div id="side-0" class="side side-aff">
        <div class="team-label">正方</div>
        <div id="display-0" class="time-display">00:00</div>
        <div class="btn-group">
            <button class="btn-start" onclick="startTimer(0)">开始发言</button>
            <button class="btn-pause" onclick="pauseTimer(0)">暂停</button>
        </div>
    </div>
    <div id="side-1" class="side side-neg">
        <div class="team-label">反方</div>
        <div id="display-1" class="time-display">00:00</div>
        <div class="btn-group">
            <button class="btn-start" onclick="startTimer(1)">开始发言</button>
            <button class="btn-pause" onclick="pauseTimer(1)">暂停</button>
        </div>
    </div>
</div>

<div class="footer-panel">
    <div class="process-grid">
        <button class="mode-btn" onclick="setMode('开篇立论', 240, 240, '双方各4分钟')">开篇立论</button>
        <button class="mode-btn" onclick="setMode('正方攻辩', 15, 30, '正提15s，反答30s')">正方攻辩</button>
        <button class="mode-btn" onclick="setMode('反方攻辩', 30, 15, '反提15s，正答30s')">反方攻辩</button>
        <button class="mode-btn" onclick="setMode('攻辩小结', 180, 180, '双方各3分钟')">攻辩小结</button>
        <button class="mode-btn" onclick="setMode('自由辩论', 300, 300, '一方结束即另一方开始')">自由辩论</button>
        <button class="mode-btn" onclick="setMode('总结陈词', 240, 240, '双方各4分钟')">总结陈词</button>
        <button id="final-btn" class="mode-btn reset-btn" onclick="handleFinalScore()">清零/打分</button>
    </div>
    <div class="credits">TECHNICAL SUPPORT BY WY & GEMINI</div>
</div>

<script>
    let timers = [
        { timeLeft: 0, interval: null, isRunning: false },
        { timeLeft: 0, interval: null, isRunning: false }
    ];

    function setMode(name, t0, t1, rule) {
        document.getElementById('stage-title').innerText = name;
        document.getElementById('rule-text').innerText = rule;

        // 重置按钮状态
        const finalBtn = document.getElementById('final-btn');
        finalBtn.innerText = "清零/打分";
        finalBtn.style.background = "#c0392b";
        finalBtn.style.color = "white";
        finalBtn.onclick = handleFinalScore; 

        [0, 1].forEach(id => {
            pauseTimer(id);
            timers[id].timeLeft = (id === 0 ? t0 : t1);
            updateUI(id);
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(name)) btn.classList.add('active');
        });
    }

    function handleFinalScore() {
        setMode('环节结束', 0, 0, '辩论结束，请裁判客观打分');
        const finalBtn = document.getElementById('final-btn');
        finalBtn.innerText = "🔥 点击宣判胜负";
        finalBtn.style.background = "#f1c40f";
        finalBtn.style.color = "black";
        finalBtn.onclick = function() { window.location.href = 'result.html'; };
    }

    function updateUI(id) {
        const t = timers[id];
        const display = document.getElementById(`display-${id}`);
        const side = document.querySelector(`.side-${id === 0 ? 'aff' : 'neg'}`);
        let m = Math.floor(t.timeLeft / 60);
        let s = t.timeLeft % 60;
        display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        
        if (t.isRunning) side.classList.add('active');
        else side.classList.remove('active');

        display.style.color = t.timeLeft === 0 ? "#444" : (t.timeLeft <= 30 ? "#f39c12" : "white");
    }

    function startTimer(id) {
        if (timers[id].isRunning || timers[id].timeLeft <= 0) return;
        pauseTimer(id === 0 ? 1 : 0);
        timers[id].isRunning = true;
        timers[id].interval = setInterval(() => {
            if (timers[id].timeLeft > 0) {
                timers[id].timeLeft--;
                if (timers[id].timeLeft === 30 || timers[id].timeLeft <= 5) playBeep(440, 0.1);
                updateUI(id);
            } else {
                pauseTimer(id);
                playBeep(880, 0.7);
            }
        }, 1000);
        updateUI(id);
    }

    function pauseTimer(id) {
        clearInterval(timers[id].interval);
        timers[id].isRunning = false;
        updateUI(id);
    }

    function playBeep(freq, dur) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0.05, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + dur);
        } catch(e) {}
    }

    setMode('准备就绪', 0, 0, '请从下方选择环节开始比赛');
</script>
</body>
</html>
